apiVersion: apps/v1
kind: Deployment
metadata:
  name: scalable-cache-api
  labels:
    app: scalable-cache-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scalable-cache-api
  template:
    metadata:
      labels:
        app: scalable-cache-api
    spec:
      containers:
        - name: scalable-cache-api
          image: scalable-cache-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: scalable-cache-api-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: scalable-cache-api-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: scalable-cache-api-config
                  key: REDIS_PORT
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3